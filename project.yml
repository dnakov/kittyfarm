name: KittyFarm
options:
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.kittyfarm
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 26.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: KittyFarm
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
    INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 sigkitten"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
packages:
  swift-protobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: 1.36.1
  grpc-swift-2:
    url: https://github.com/grpc/grpc-swift-2.git
    from: 2.3.0
  grpc-swift-nio-transport:
    url: https://github.com/grpc/grpc-swift-nio-transport.git
    from: 2.3.0
  grpc-swift-protobuf:
    url: https://github.com/grpc/grpc-swift-protobuf.git
    from: 2.1.0
targets:
  KittyFarm:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: KittyFarm
        excludes:
          - "DevTools/Network/Resources/**"
      - path: Protos
        excludes:
          - "*.proto"
      - path: KittyFarm/DevTools/Network/Resources/mitmproxy_addon.py
        buildPhase: resources
    resources:
      - path: KittyFarm/Resources
    dependencies:
      - package: swift-protobuf
        product: SwiftProtobuf
      - package: grpc-swift-2
        product: GRPCCore
      - package: grpc-swift-nio-transport
        product: GRPCNIOTransportHTTP2
      - package: grpc-swift-protobuf
        product: GRPCProtobuf
    settings:
      base:
        PRODUCT_NAME: KittyFarm
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_OBJC_BRIDGING_HEADER: KittyFarm/Support/KittyFarm-Bridging-Header.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS:
          - -ObjC
          - -lsqlite3
    postCompileScripts:
      - name: Validate Android gRPC assets
        script: |
          if [ ! -f "${SRCROOT}/Protos/emulator_controller.proto" ]; then
            echo "warning: Protos/emulator_controller.proto is missing. Android emulator control bindings may drift from upstream."
          fi

          if [ ! -f "${SRCROOT}/Protos/emulator_controller_kittyfarm.proto" ]; then
            echo "warning: Protos/emulator_controller_kittyfarm.proto is missing. Android gRPC client generation cannot be refreshed."
          fi

          if [ ! -f "${SRCROOT}/KittyFarm/Generated/emulator_controller_kittyfarm.pb.swift" ] || [ ! -f "${SRCROOT}/KittyFarm/Generated/emulator_controller_kittyfarm.grpc.swift" ]; then
            echo "warning: Android gRPC stubs are missing. Regenerate them with GeneratedNotice.androidCodegenCommand."
          fi
      - name: Build and embed KittyProbe
        script: |
          set -euo pipefail

          PROBE_SRC="${SRCROOT}/KittyProbe"
          PROBE_BUILD="/tmp/KittyProbeBuilds"
          PROBE_DEST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/KittyProbe"

          if [ ! -d "${PROBE_SRC}/KittyProbe.xcodeproj" ]; then
            echo "warning: KittyProbe.xcodeproj not found — skipping probe embed. Run 'cd KittyProbe && xcodegen generate' first."
            exit 0
          fi

          # Check if products already exist and are fresh.
          # `find | head -1` would trip `pipefail` when the search root is missing,
          # so guard with directory existence first.
          RUNNER_APP=""
          HOST_APP="${PROBE_BUILD}/Build/Products/Debug-iphonesimulator/KittyProbeApp.app"
          XCTESTRUN=""
          if [ -d "${PROBE_BUILD}/Build/Products/Debug-iphonesimulator" ]; then
            RUNNER_APP=$(find "${PROBE_BUILD}/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name "*-Runner.app" 2>/dev/null | head -1 || true)
          fi
          if [ -d "${PROBE_BUILD}" ]; then
            XCTESTRUN=$(find "${PROBE_BUILD}" -name "*.xctestrun" 2>/dev/null | head -1 || true)
          fi

          NEEDS_BUILD=0
          if [ -z "${RUNNER_APP}" ] || [ ! -d "${HOST_APP}" ] || [ -z "${XCTESTRUN}" ]; then
            NEEDS_BUILD=1
          else
            NEWEST_SRC=$(find "${PROBE_SRC}" -name "*.swift" -newer "${RUNNER_APP}" 2>/dev/null | head -1 || true)
            if [ -n "${NEWEST_SRC}" ]; then
              NEEDS_BUILD=1
            fi
          fi

          if [ "${NEEDS_BUILD}" = "1" ]; then
            echo "Building KittyProbe for iOS Simulator..."
            # Clean env to prevent parent xcodebuild vars from polluting the child build
            env -i HOME="$HOME" PATH="$PATH" \
              xcodebuild build-for-testing \
                -project "${PROBE_SRC}/KittyProbe.xcodeproj" \
                -scheme KittyProbeTests \
                -destination 'generic/platform=iOS Simulator' \
                -derivedDataPath "${PROBE_BUILD}" \
                -quiet 2>&1
          fi

          # Re-resolve paths after build
          RUNNER_APP=$(find "${PROBE_BUILD}/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name "*-Runner.app" | head -1)
          XCTESTRUN=$(find "${PROBE_BUILD}" -name "*.xctestrun" | head -1)

          if [ -z "${RUNNER_APP}" ] || [ ! -d "${HOST_APP}" ] || [ -z "${XCTESTRUN}" ]; then
            echo "warning: KittyProbe build products not found after build — skipping embed."
            exit 0
          fi

          # Copy into app bundle. The .xctestrun references __TESTROOT__/Debug-iphonesimulator/*.app
          # where __TESTROOT__ is the directory containing the xctestrun file — mirror that layout.
          mkdir -p "${PROBE_DEST}/Debug-iphonesimulator"
          rsync -a --delete "${HOST_APP}" "${PROBE_DEST}/Debug-iphonesimulator/"
          rsync -a --delete "${RUNNER_APP}" "${PROBE_DEST}/Debug-iphonesimulator/"
          cp -f "${XCTESTRUN}" "${PROBE_DEST}/"

          echo "KittyProbe embedded at ${PROBE_DEST}"
  KittyFarmTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: KittyFarmTests
    dependencies:
      - target: KittyFarm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.kittyfarm.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KittyFarm.app/Contents/MacOS/KittyFarm"
schemes:
  KittyFarm:
    build:
      targets:
        KittyFarm: all
        KittyFarmTests: [test]
    test:
      targets:
        - KittyFarmTests
