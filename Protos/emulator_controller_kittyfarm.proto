syntax = "proto3";

package android.emulation.control;

import "google/protobuf/empty.proto";

service EmulatorController {
  rpc sendKey(KeyboardEvent) returns (google.protobuf.Empty) {}
  rpc setClipboard(ClipData) returns (google.protobuf.Empty) {}
  rpc sendTouch(TouchEvent) returns (google.protobuf.Empty) {}
  rpc streamScreenshot(ImageFormat) returns (stream Image) {}
}

message ImageTransport {
  enum TransportChannel {
    TRANSPORT_CHANNEL_UNSPECIFIED = 0;
    MMAP = 1;
  }

  TransportChannel channel = 1;
  string handle = 2;
}

message ImageFormat {
  enum ImgFormat {
    PNG = 0;
    RGBA8888 = 1;
    RGB888 = 2;
  }

  ImgFormat format = 1;
  uint32 width = 3;
  uint32 height = 4;
  uint32 display = 5;
  ImageTransport transport = 6;
}

message Image {
  ImageFormat format = 1;
  uint32 width = 2 [deprecated = true];
  uint32 height = 3 [deprecated = true];
  bytes image = 4;
  uint32 seq = 5;
  uint64 timestampUs = 6;
}

message ClipData {
  string text = 1;
}

message KeyboardEvent {
  enum KeyCodeType {
    USB = 0;
    EVDEV = 1;
    XKB = 2;
    WIN = 3;
    MAC = 4;
  }

  enum KeyEventType {
    KEYDOWN = 0;
    KEYUP = 1;
    KEYPRESS = 2;
  }

  KeyCodeType codeType = 1;
  KeyEventType eventType = 2;
  int32 keyCode = 3;
  string key = 4;
  string text = 5;
}

message Touch {
  enum EventExpiration {
    EVENT_EXPIRATION_UNSPECIFIED = 0;
    NEVER_EXPIRE = 1;
  }

  int32 x = 1;
  int32 y = 2;
  int32 identifier = 3;
  int32 pressure = 4;
  int32 touch_major = 5;
  int32 touch_minor = 6;
  EventExpiration expiration = 7;
  int32 orientation = 8;
}

message TouchEvent {
  repeated Touch touches = 1;
  int32 display = 2;
}
